name: Build and release

# Runs when you push a version tag like v1.0.0, and builds a ready-to-install
# package so colleagues don't need Node or a build step.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install deps
        run: npm ci

      - name: Build sandbox (dist/main.js)
        run: npm run build

      - name: Package the Pixso plugin
        run: |
          root=package/ds-component-audit
          mkdir -p "$root/dist" "$root/src"
          cp manifest.json "$root/"
          cp dist/main.js "$root/dist/"
          cp src/ui.html "$root/src/"
          cp merge-tool/index.html "$root/merge-tool.html"
          printf '%s\n' \
            'DS Component Audit' \
            '==================' \
            '' \
            'Plugin (Pixso):' \
            '  Pixso -> Plugins -> Development -> Import from manifest -> pick manifest.json' \
            '  (in this folder). The plugin then appears in your plugins list.' \
            '' \
            'Merge tool:' \
            '  Open merge-tool.html in any browser. Drag the plugin.xlsx exports' \
            '  onto it to combine them into one file.' \
            '' \
            'To update: download the latest package, unzip, delete the old folder,' \
            'and re-import the manifest in Pixso.' \
            > "$root/README.txt"
          cd package && zip -r ../ds-component-audit.zip ds-component-audit

      - name: Create GitHub Release with the package
        uses: softprops/action-gh-release@v2
        with:
          files: ds-component-audit.zip
          body: |
            One package with both the Pixso plugin and the merge tool.

            1. Download **ds-component-audit.zip** and unzip it.
            2. **Plugin** — in Pixso: Plugins → Development → Import from manifest → pick `manifest.json` in the folder.
            3. **Merge tool** — open `merge-tool.html` in a browser (no install).

            To update: download the new zip, unzip, delete the old folder, re-import the manifest.
